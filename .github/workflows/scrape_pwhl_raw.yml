name: Scrape PWHL Raw Data

on:
  schedule:
    # PWHL regular season: November through March
    - cron: '0 8 * 11-12 *'
    - cron: '0 8 * 1-3 *'
    # Playoffs: March through May
    - cron: '0 8 * 4-5 *'
  workflow_dispatch:
    inputs:
      start_year:
        description: 'Start year (e.g. 2025 for 2024-25 season)'
        required: false
        type: string
      end_year:
        description: 'End year (e.g. 2025 for 2024-25 season)'
        required: false
        type: string
      rescrape:
        description: 'Rescrape existing games'
        required: false
        type: boolean
        default: true

jobs:
  scrape_pwhl_raw:
    runs-on: ${{ matrix.config.os }}
    name: Scrape PWHL Raw ${{ inputs.start_year }}-${{ inputs.end_year }}
    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: 'ubuntu-latest', r: 'release'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      START_YEAR: ${{ inputs.start_year }}
      END_YEAR: ${{ inputs.end_year }}
      RESCRAPE: ${{ inputs.rescrape }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setting up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          use-public-rspm: true

      - name: Setting up R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          extra-packages: |
            sportsdataverse/fastRhockey

      - name: Check for empty inputs
        if: ${{ env.START_YEAR == '' }}
        run: |
          echo START_YEAR=$(Rscript -e "cat(fastRhockey:::most_recent_pwhl_season())") >> $GITHUB_ENV
          echo END_YEAR=$(Rscript -e "cat(fastRhockey:::most_recent_pwhl_season())") >> $GITHUB_ENV

      - name: Set default rescrape
        if: ${{ env.RESCRAPE == '' }}
        run: |
          echo RESCRAPE=TRUE >> $GITHUB_ENV

      - name: Scrape PWHL Raw Data ${{ env.START_YEAR }}-${{ env.END_YEAR }}
        run: |
          bash scripts/daily_pwhl_scraper.sh -s ${{ env.START_YEAR }} -e ${{ env.END_YEAR }} -r ${{ env.RESCRAPE }}
